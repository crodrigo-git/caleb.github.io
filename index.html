<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dulce Tentación</title>
    <link rel="stylesheet" href="estilos.css">
</head> 
<body>

    <h1>Dulce Tentación 🍰</h1>
    <p>Los mejores postres caseros</p>

    <h2>Productos</h2>

    <div>
      <img src="torta.jpg">
        <p>Torta de chocolate - S/35</p>
        <button onclick="agregar('Torta de chocolate', 35)">Agregar</button>
    </div>

    <div>
      <img src="cupcake.jpg">
        <p>Cupcakes (6 unidades) - S/18</p>
        <button onclick="agregar('Cupcakes', 18)">Agregar</button>
    </div>

    <div>
         <img src="cheesecake.jpg.jpg" width="200">
        <p>Cheesecake - S/28</p>
        <button onclick="agregar('Cheesecake', 28)">Agregar</button>
    </div>

    <h2>Carrito</h2>
    <ul id="carrito"></ul>
    <p>Total: S/ <span id="total">0</span></p>

    <script>
        let total = 0;

        function agregar(nombre, precio) {
            let lista = document.getElementById("carrito");
            let item = document.createElement("li");
            item.textContent = nombre + " - S/" + precio;
            lista.appendChild(item);

            total += precio;
            document.getElementById("total").textContent = total;
        }
    </script>

</body>
</html>
